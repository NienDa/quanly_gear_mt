<!DOCTYPE html>

<html
        xmlns:th="http://www.thymeleaf.org"
        lang="en"
>

<head>

    <title>Gear Shop</title>

    <link
            rel="stylesheet"
            th:href="@{/css/bootstrap.min.css}"
    >

</head>

<body class="bg-light">

<!-- NAVBAR -->

<nav
        class="navbar navbar-expand-lg navbar-dark bg-dark"
>

    <div class="container-fluid">

        <a
                class="navbar-brand"
                href="/home"
        >

            Gear Computer

        </a>

        <div class="d-flex">

            <span
                    class="text-white me-3"
            >

                Welcome,

                <span
                        th:text="${session.user.fullName}"
                >
                </span>

            </span>

            <a
                    href="/logout"
                    class="btn btn-danger btn-sm"
            >

                Logout

            </a>

        </div>

    </div>

</nav>

<!-- CONTENT -->

<div class="container mt-5">

    <div
            class="text-center mb-5"
    >

        <h1 class="text-primary">

            Gear Computer Management

        </h1>

        <p class="text-muted">

            Spring Boot + Thymeleaf + MySQL

        </p>

        <h5>

            Role:

            <span
                    class="badge bg-success"
                    th:text="${session.role}"
            >
            </span>

        </h5>

    </div>

    <!-- CARD MENU -->

    <div class="row g-4">

        <!-- PRODUCT -->

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>

                        Products

                    </h3>

                    <p>

                        Manage computer gear products

                    </p>

                    <a
                            href="/products"
                            class="btn btn-dark"
                    >

                        Manage Products

                    </a>

                </div>

            </div>

        </div>

        //category
        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>

                        Categories

                    </h3>

                    <p>

                        Manage product categories

                    </p>

                    <a
                            href="/categories"
                            class="btn btn-primary"
                    >

                        Manage Categories

                    </a>

                </div>

            </div>

        </div>

        //inventory

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>

                        Inventory

                    </h3>

                    <p>

                        Manage product stock

                    </p>

                    <a
                            href="/inventory"
                            class="btn btn-success"
                    >

                        Inventory

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
