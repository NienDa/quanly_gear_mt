<!DOCTYPE html>

<html
        xmlns:th="http://www.thymeleaf.org"
        lang="en"
>

<head>

    <meta charset="UTF-8">

    <title>
        Gear Computer Shop
    </title>

    <link
            rel="stylesheet"
            th:href="@{/css/bootstrap.min.css}"
    >

    <style>

        .product-card{

            transition: 0.2s;
        }

        .product-card:hover{

            transform: translateY(-5px);
        }

        .banner{

            background:
                    linear-gradient(
                            135deg,
                            #0d6efd,
                            #212529
                    );

            color: white;

            border-radius: 15px;
        }

    </style>

</head>

<body class="bg-light">

<!-- NAVBAR -->

<nav
        class="navbar navbar-expand-lg navbar-dark bg-dark"
>

    <div class="container">

        <a
                class="navbar-brand fw-bold"
                href="/"
        >

            Gear Computer

        </a>

        <button
                class="navbar-toggler"

                type="button"

                data-bs-toggle="collapse"

                data-bs-target="#navbarNav"
        >

            <span class="navbar-toggler-icon">
            </span>

        </button>

        <div
                class="collapse navbar-collapse"
                id="navbarNav"
        >

            <ul class="navbar-nav me-auto">

                <li class="nav-item">

                    <a
                            class="nav-link active"
                            href="/"
                    >

                        Trang Chủ

                    </a>

                </li>

                <li class="nav-item">

                    <a
                            class="nav-link"
                            href="/shop/products"
                    >

                        Sản Phẩm

                    </a>

                </li>

            </ul>

            <!-- SEARCH -->

            <form
                    class="d-flex me-3"

                    th:action="@{/shop/search}"

                    method="get"
            >

                <input

                        class="form-control me-2"

                        type="search"

                        name="q"

                        placeholder="Search product..."
                >

                <button
                        class="btn btn-outline-light"
                        type="submit"
                >

                    Search

                </button>

            </form>

            <!-- LOGIN -->

            <a
                    href="/login"
                    class="btn btn-warning"
            >

                Login

            </a>

        </div>

    </div>

</nav>

<!-- BODY -->

<div class="container mt-4">

    <!-- BANNER -->

    <div
            class="banner p-5 text-center shadow"
    >

        <h1 class="display-5 fw-bold">

            Gear Computer Shop

        </h1>

        <p class="mt-3">

            Gaming Mouse - Keyboard - Headphone

        </p>

    </div>

    <!-- CATEGORY -->

    <div
            class="d-flex justify-content-between
    align-items-center mt-5 mb-4"
    >

        <h2 class="fw-bold">

            Product List

        </h2>

        <form
                method="get"
                th:action="@{/shop/category}"
        >

            <select

                    name="id"

                    class="form-select"

                    onchange="this.form.submit()"
            >

                <option value="">

                    All Categories

                </option>

                <option

                        th:each="c : ${categories}"

                        th:value="${c.id}"

                        th:text="${c.categoryName}"

                >

                </option>

            </select>

        </form>

    </div>

    <!-- PRODUCT CARD -->

    <div class="row g-4">

        <div
                class="col-md-3"

                th:each="p : ${products}"
        >

            <div
                    class="card h-100 shadow-sm product-card"
            >

                <!-- IMAGE -->

                <img

                        th:src=
                                "@{/images/{img}(img=${p.imageUrl})}"

                        class="card-img-top"

                        style=
                                "height:220px;
                        object-fit:cover"
                >

                <!-- BODY -->

                <div
                        class="card-body d-flex flex-column"
                >

                    <h5
                            class="card-title"

                            th:text="${p.productName}"
                    >
                    </h5>

                    <p
                            class="text-muted"

                            th:text="${p.brand}"
                    >
                    </p>

                    <p
                            class="fw-bold text-primary"
                    >

                        <span
                                th:text="${p.price}"
                        >
                        </span>

                        VND

                    </p>

                    <p
                            class="small text-secondary"
                    >

                        Category:

                        <span
                                th:text=
                                        "${p.category.categoryName}"
                        >
                        </span>

                    </p>

                    <!-- BUTTON -->

                    <div class="mt-auto">

                        <a

                                th:href=
                                        "@{/buy/{id}(id=${p.id})}"

                                class="btn btn-dark w-100"
                        >

                            Buy Now

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- FOOTER -->

<footer
        class="bg-dark text-white text-center
py-4 mt-5"
>

    <h5>

        Gear Computer Shop

    </h5>

    <p>

        Spring Boot + Thymeleaf + MySQL

    </p>

</footer>

<script
        th:src="@{/js/bootstrap.bundle.min.js}"
>
</script>

</body>

</html>
