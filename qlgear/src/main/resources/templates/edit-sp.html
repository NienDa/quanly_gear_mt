<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        lang="en"
>

<head>

    <title>Edit Product</title>

    <link
            rel="stylesheet"
            th:href="@{/css/bootstrap.min.css}"
    >

</head>

<body>

<div class="container mt-5">

    <div class="card p-4">

        <h2 class="mb-4">
            Edit Product
        </h2>

        <form
                th:action="@{/update/{id}(id=${sp.id})}"
                method="post"
                th:object="${sp}"
        >

            <div class="mb-3">
                <label>Product Name</label>
                <input
                        type="text"
                        class="form-control"
                        th:field="*{productName}"
                >
            </div>

            <div class="mb-3">
                <label>Brand</label>
                <input
                        type="text"
                        class="form-control"
                        th:field="*{brand}"
                >

            </div>

            <div class="mb-3">
                <label>Description</label>
                <textarea
                        class="form-control"
                        th:field="*{description}">
                </textarea>
            </div>

            <div class="mb-3">

                <label>Price</label>

                <input
                        type="number"
                        class="form-control"
                        th:field="*{price}"
                >
            </div>
            <div class="mb-3">

                <label>
                    Category
                </label>

                <select
                        class="form-select"
                        th:field="*{category}"
                >
                    <option
                            th:each="c : ${categories}"
                            th:value="${c.id}"
                            th:text="${c.categoryName}"
                    >
                    </option>
                </select>

            </div>
            <div class="mb-3">
                <label>Image URL</label>
                <input
                        type="text"
                        class="form-control"
                        th:field="*{imageUrl}"
                >
            </div>

            <div class="mb-3">
                <label>Status</label>
                <input
                        type="text"
                        class="form-control"
                        th:field="*{status}"
                >
            </div>
            <button
                    type="submit"
                    class="btn btn-primary"
            >
                Update Product
            </button>

        </form>

    </div>

</div>

</body>
</html>
