<!DOCTYPE html>

<html
        xmlns:th="http://www.thymeleaf.org"
        lang="en"
>

<head>

    <title>Login</title>

    <link
            rel="stylesheet"
            th:href="@{/css/bootstrap.min.css}"
    >

</head>

<body>

<div class="container mt-5">

    <div
            class="card p-4 mx-auto"
            style="width:400px"
    >

        <h2 class="text-center mb-4">

            Login

        </h2>

        <form
                th:action="@{/login}"
                method="post"
        >

            <div class="mb-3">

                <label>
                    Username
                </label>

                <input

                        type="text"

                        name="username"

                        class="form-control"

                >

            </div>

            <div class="mb-3">

                <label>
                    Password
                </label>

                <input

                        type="password"

                        name="password"

                        class="form-control"

                >

            </div>

            <button

                    type="submit"

                    class="btn btn-primary w-100"

            >

                Login

            </button>

        </form>

    </div>

</div>

</body>
</html>
